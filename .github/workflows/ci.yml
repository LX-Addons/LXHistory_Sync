name: 构建与检查浏览器扩展

on:
  push:
    branches: [main, beta, release]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: "创建发布版本"
        required: false
        default: false
        type: boolean
      skip_e2e:
        description: "跳过 E2E 测试（加快构建速度）"
        required: false
        default: false
        type: boolean
      clear_caches:
        description: "清除旧的 npm 和 Plasmo 缓存后再构建"
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || !contains(fromJSON('["main", "beta", "release"]'), github.ref_name) }}

env:
  NODE_VERSION: "20"
  EXTENSION_SIZE_LIMIT_MB: 10

jobs:
  setup:
    name: 准备环境
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
    outputs:
      cache_key: ${{ steps.cache-key.outputs.key }}
      artifact_retention: ${{ steps.retention.outputs.days }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 生成缓存 key
        id: cache-key
        run: |
          CACHE_KEY="${{ runner.os }}-${{ github.ref_name }}-node-${{ hashFiles('**/package-lock.json') }}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "📁 缓存 Key: $CACHE_KEY"

      - name: 设置产物保留天数
        id: retention
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "beta" || "${{ github.ref_name }}" == "release" ]]; then
            echo "days=30" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "days=14" >> $GITHUB_OUTPUT
          else
            echo "days=7" >> $GITHUB_OUTPUT
          fi

      - name: 清除当前分支旧缓存
        if: ${{ github.event.inputs.clear_caches == 'true' || github.event_name == 'push' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchPrefix = '${{ github.ref_name }}'.replace(/[^a-zA-Z0-9-]/g, '-');
            const prefixes = [
              '${{ runner.os }}-' + branchPrefix + '-node-',
              '${{ runner.os }}-' + branchPrefix + '-plasmo-'
            ];
            let cachesCleared = 0;
            
            console.log('🔍 正在清除当前分支相关缓存...');
            
            for (const prefix of prefixes) {
              let page = 1;
              const perPage = 100;
              
              while (true) {
                const { data: { actions_caches: caches } } = await github.rest.actions.getActionsCacheList({
                  owner,
                  repo,
                  per_page: perPage,
                  page: page
                });
                
                if (!caches || caches.length === 0) break;
                
                for (const cache of caches) {
                  if (cache.key.startsWith(prefix)) {
                    console.log(`🗑️ 删除缓存: ${cache.key}`);
                    try {
                      await github.rest.actions.deleteActionsCacheById({
                        owner,
                        repo,
                        cache_id: cache.id
                      });
                      cachesCleared++;
                    } catch (error) {
                      console.error(`❌ 删除失败: ${error.message}`);
                    }
                  }
                }
                
                if (caches.length < perPage) break;
                page++;
              }
            }
            
            console.log(`\n✅ 成功清除 ${cachesCleared} 个缓存`);

      - name: 输出准备摘要
        run: |
          echo "## 🚀 环境准备完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **分支** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **事件类型** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **缓存 Key** | \`${{ steps.cache-key.outputs.key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **产物保留** | ${{ steps.retention.outputs.days }} 天 |" >> $GITHUB_STEP_SUMMARY

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: [setup]
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 配置 Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --ignore-scripts

      - name: TypeScript 类型检查
        run: npm run typecheck

      - name: ESLint 代码检查
        run: npm run lint

      - name: Prettier 格式检查
        run: npm run format:check

      - name: 输出检查摘要
        if: always()
        run: |
          echo "## 🔍 代码检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript 类型检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint 代码检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          echo "| Prettier 格式检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    needs: [setup]
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: 配置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node-version }}

      - name: 缓存 node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-${{ github.ref_name }}-node${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node${{ matrix.node-version }}-
            ${{ runner.os }}-node${{ matrix.node-version }}-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --ignore-scripts

      - name: 运行单元测试并生成覆盖率报告
        run: npm run test:unit -- --coverage

      - name: 上传覆盖率到 Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 上传测试产物
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: test-coverage-node${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: ${{ needs.setup.outputs.artifact_retention }}
          if-no-files-found: warn

  sonarcloud:
    name: SonarCloud 代码扫描
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    needs: [setup, test]
    if: needs.test.result == 'success'
    steps:
      - name: 检查 SonarCloud 配置
        id: check_sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::SONAR_TOKEN 未配置，跳过 SonarCloud 扫描"
          fi

      - name: 检出仓库
        if: steps.check_sonar.outputs.configured == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: 下载测试覆盖率产物
        if: steps.check_sonar.outputs.configured == 'true'
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: test-coverage-node20
          path: .

      - name: SonarCloud 扫描
        if: steps.check_sonar.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: 上传 SonarCloud 产物
        if: always() && steps.check_sonar.outputs.configured == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: sonarcloud-report
          path: .scannerwork/
          retention-days: ${{ needs.setup.outputs.artifact_retention }}
          if-no-files-found: warn

  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    needs: [setup]
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: 配置 Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --ignore-scripts

      - name: 检查密钥泄露
        uses: trufflesecurity/trufflehog@6961f2bace57ab32b23b3ba40f8f420f6bc7e004
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: 依赖安全审计
        run: |
          echo "### 🛡️ 依赖安全审计" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>点击查看完整审计报告</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: 安全模式检查
        run: |
          echo "### 🔍 安全模式检查" >> $GITHUB_STEP_SUMMARY
          EXIT_CODE=0
          
          echo "#### eval 使用检查" >> $GITHUB_STEP_SUMMARY
          if grep -r "eval(" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v ".plasmo"; then
            echo "❌ 发现 eval() 使用 - 潜在安全风险" >> $GITHUB_STEP_SUMMARY
            EXIT_CODE=1
          else
            echo "✅ 未发现 eval() 使用" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "#### dangerouslySetInnerHTML 检查" >> $GITHUB_STEP_SUMMARY
          if grep -r "dangerouslySetInnerHTML" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v ".plasmo"; then
            echo "⚠️ 发现 dangerouslySetInnerHTML 使用 - XSS 风险" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 未发现 dangerouslySetInnerHTML 使用" >> $GITHUB_STEP_SUMMARY
          fi
          
          exit $EXIT_CODE

  build:
    name: 构建扩展
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: [setup, lint, test, sonarcloud, security]
    if: needs.lint.result == 'success' && needs.test.result == 'success' && (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped') && (needs.security.result == 'success' || needs.security.result == 'skipped')
    outputs:
      version: ${{ steps.version.outputs.version }}
      name: ${{ steps.version.outputs.name }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 配置 Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --ignore-scripts

      - name: 缓存 Plasmo 构建缓存
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: .plasmo
          key: ${{ runner.os }}-${{ github.ref_name }}-plasmo-${{ hashFiles('**/package-lock.json', '**/*.ts', '**/*.tsx', '**/*.css', 'assets/*') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-plasmo-
            ${{ runner.os }}-plasmo-

      - name: 构建扩展
        run: npm run build:ci

      - name: 获取版本信息
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: 检查扩展体积
        run: |
          BUILD_DIR="build/chrome-mv3-prod"
          if [ -d "$BUILD_DIR" ]; then
            SIZE_KB=$(du -sk "$BUILD_DIR" | cut -f1)
            SIZE_MB=$((SIZE_KB / 1024))
            echo "📊 扩展体积: ${SIZE_MB}MB (${SIZE_KB}KB)"
            
            if [ "$SIZE_MB" -gt "${{ env.EXTENSION_SIZE_LIMIT_MB }}" ]; then
              echo "❌ 扩展体积 (${SIZE_MB}MB) 超出限制 (${{ env.EXTENSION_SIZE_LIMIT_MB }}MB)"
              exit 1
            fi
            echo "✅ 扩展体积符合限制"
          fi

      - name: 验证构建产物
        run: |
          BUILD_DIR="build/chrome-mv3-prod"
          
          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ 构建目录不存在: $BUILD_DIR"
            exit 1
          fi
          
          echo "📁 构建内容:"
          ls -la "$BUILD_DIR"
          
          REQUIRED_FILES=("manifest.json" "popup.html")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$BUILD_DIR/$file" ]; then
              echo "✅ $file 存在"
            else
              echo "❌ $file 缺失"
              exit 1
            fi
          done

      - name: 打包扩展
        run: npm run package

      - name: 重命名构建产物
        run: |
          VERSION=${{ steps.version.outputs.version }}
          NAME=${{ steps.version.outputs.name }}
          
          if [ -d "build/chrome-mv3-prod" ]; then
            mv "build/chrome-mv3-prod" "build/${NAME}-${VERSION}-chrome"
          fi
          
          if [ -f "build/chrome-mv3-prod.zip" ]; then
            mv "build/chrome-mv3-prod.zip" "build/${NAME}-${VERSION}-chrome.zip"
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: extension-${{ steps.version.outputs.version }}
          path: build/
          retention-days: ${{ needs.setup.outputs.artifact_retention }}

      - name: 输出构建摘要
        run: |
          echo "## 📦 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **版本** | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **名称** | \`${{ steps.version.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **产物保留** | ${{ needs.setup.outputs.artifact_retention }} 天 |" >> $GITHUB_STEP_SUMMARY

  e2e:
    name: E2E测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    needs: [setup, build]
    if: needs.build.result == 'success' && github.event.inputs.skip_e2e != 'true'
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 配置 Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --ignore-scripts

      - name: 下载构建产物
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          pattern: extension-*
          path: build/
          merge-multiple: true

      - name: 准备测试扩展
        run: |
          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          
          if [ -d "build/${NAME}-${VERSION}-chrome" ]; then
            mv "build/${NAME}-${VERSION}-chrome" "build/chrome-mv3-prod"
          fi
          
          ls -la build/

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 运行 E2E 测试
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: 上传 Playwright 报告
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: ${{ needs.setup.outputs.artifact_retention }}
          if-no-files-found: warn

  pr-comment:
    name: PR评论
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    needs: [setup, lint, test, sonarcloud, security, build, e2e]
    if: always() && github.event_name == 'pull_request' && (needs.lint.result == 'success' || needs.lint.result == 'failure') && (needs.test.result == 'success' || needs.test.result == 'failure')
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 获取版本信息
        id: info
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 检查是否为 Dependabot PR
        id: dependabot
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "is_dependabot=true" >> $GITHUB_OUTPUT
          else
            echo "is_dependabot=false" >> $GITHUB_OUTPUT
          fi

      - name: 创建 PR 评论
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const setupResult = '${{ needs.setup.result }}';
            const lintResult = '${{ needs.lint.result }}';
            const testResult = '${{ needs.test.result }}';
            const sonarcloudResult = '${{ needs.sonarcloud.result }}';
            const securityResult = '${{ needs.security.result }}';
            const buildResult = '${{ needs.build.result }}';
            const e2eResult = '${{ needs.e2e.result }}';
            const version = '${{ steps.info.outputs.version }}';
            const isDependabot = '${{ steps.dependabot.outputs.is_dependabot }}' === 'true';
            
            const statusEmoji = (result) => {
              if (result === 'success') return '✅';
              if (result === 'failure') return '❌';
              if (result === 'skipped') return '⏭️';
              return '⚠️';
            };
            
            const statusColor = (result) => {
              if (result === 'success') return 'brightgreen';
              if (result === 'failure') return 'red';
              return 'yellow';
            };
            
            const getBadge = (label, result) => {
              const color = statusColor(result);
              return `![${label}](https://img.shields.io/badge/${encodeURIComponent(label)}-${result}-${color}?style=flat-square)`;
            };

            let body = `## 🛠️ 扩展构建仪表盘\n\n`;
            body += `> **版本:** \`${version}\` | **分支:** \`${{ github.ref_name }}\` | **运行 ID:** [#${{ github.run_number }}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})\n\n`;
            
            body += `### 📊 检查结果概览\n\n`;
            body += `| 阶段 | 检查项 | 状态 | 说明 |\n`;
            body += `| :---: | :--- | :---: | :--- |\n`;
            body += `| 🚀 | **环境准备** | ${statusEmoji(setupResult)} | 缓存与产物配置 |\n`;
            body += `| 🔍 | **代码检查** | ${statusEmoji(lintResult)} | TypeScript + ESLint + Prettier |\n`;
            body += `| 🧪 | **单元测试** | ${statusEmoji(testResult)} | Node.js 20/22 多版本测试 |\n`;
            body += `| 📊 | **SonarCloud** | ${statusEmoji(sonarcloudResult)} | 代码质量与覆盖率扫描 |\n`;
            body += `| 🛡️ | **安全扫描** | ${statusEmoji(securityResult)} | 密钥泄露 + 依赖审计 |\n`;
            body += `| 📦 | **扩展构建** | ${statusEmoji(buildResult)} | Plasmo 生产构建 |\n`;
            body += `| 🎭 | **E2E 测试** | ${statusEmoji(e2eResult)} | Playwright 浏览器测试 |\n\n`;
            
            body += `### 🏷️ 状态徽章\n\n`;
            body += `${getBadge('代码检查', lintResult)} ${getBadge('单元测试', testResult)} ${getBadge('SonarCloud', sonarcloudResult)} ${getBadge('安全扫描', securityResult)} ${getBadge('构建', buildResult)} ${getBadge('E2E测试', e2eResult)}\n\n`;
            
            const results = {
              lint: lintResult,
              test: testResult,
              sonarcloud: sonarcloudResult,
              security: securityResult,
              build: buildResult
            };
            const allSuccess = ['lint', 'test', 'sonarcloud', 'security', 'build'].every(r => 
              results[r] === 'success'
            );
            const e2eSuccess = e2eResult === 'success' || e2eResult === 'skipped';
            
            if (allSuccess && e2eSuccess) {
              body += `> 🎉 **所有检查已通过！** 代码已准备好合并。\n\n`;
            } else {
              body += `> ⚠️ **部分检查未通过**，请查看上方详情或检查日志。\n\n`;
            }
            
            if (buildResult === 'success') {
              body += `---\n\n`;
              body += `### 📥 下载构建产物\n\n`;
              body += `构建产物可在 [工作流运行页面](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) 的 **Artifacts** 区域下载。\n\n`;
            }
            
            if (isDependabot) {
              body += `---\n\n`;
              body += `### 🤖 Dependabot 依赖更新\n\n`;
              if (allSuccess && e2eSuccess) {
                body += `✅ 所有关键检查已通过，已添加 \`待审核\` 标签。\n\n`;
                body += `⚠️ **需要人工审核后才能合并到主分支。**\n`;
              } else {
                body += `⚠️ 部分检查未通过，需要人工审核。\n`;
              }
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  release:
    name: 创建发布
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    needs: [setup, build, e2e, security, sonarcloud]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped') &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_release == 'true'
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: 获取版本信息
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: 下载构建产物
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          pattern: extension-*
          path: build/
          merge-multiple: true

      - name: 生成更新日志
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          CURRENT_VERSION="${{ steps.version.outputs.version }}"
          
          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES=$(npx --yes git-cliff --strip header 2>/dev/null || echo "初始发布 v${CURRENT_VERSION}")
          else
            NOTES=$(npx --yes git-cliff "${PREVIOUS_TAG}..HEAD" --strip header 2>/dev/null || echo "发布 v${CURRENT_VERSION}")
          fi
          
          if [ -z "$NOTES" ] || [ "$NOTES" = "## [Unreleased]" ]; then
            NOTES="## 更新内容\n\n- 版本更新至 ${CURRENT_VERSION}"
          fi
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 检查标签是否存在
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 创建发布版本
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 发布 v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            build/*.zip
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          generate_release_notes: false

      - name: 发布摘要
        run: |
          echo "## 🎉 发布已创建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **版本** | \`v${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **类型** | ${{ github.ref == 'refs/heads/main' && '正式版' || '预发布版' }} |" >> $GITHUB_STEP_SUMMARY

  dependabot-notify:
    name: Dependabot通知
    runs-on: ubuntu-latest
    needs: [setup, lint, test, sonarcloud, security, build, e2e]
    if: |
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      needs.build.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: 添加待审核标签
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['待审核']
            })
            core.info('✅ 已添加待审核标签，等待人工审核后合并')

  notify-failure:
    name: 失败通知
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: [setup, lint, test, sonarcloud, security, build, e2e]
    if: failure() && github.event_name != 'pull_request'
    steps:
      - name: 创建失败摘要
        run: |
          echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 阶段 | 任务 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "| :---: | :--- | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 | 环境准备 | ${{ needs.setup.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 | 代码检查 | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 | 单元测试 | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 | SonarCloud | ${{ needs.sonarcloud.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ | 安全扫描 | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 | 构建 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 | E2E 测试 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请查看 [工作流日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) 了解详情。" >> $GITHUB_STEP_SUMMARY
