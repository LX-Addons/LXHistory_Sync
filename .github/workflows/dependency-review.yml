name: '依赖审查'
on:
  pull_request:
    branches: ["main"]
    paths:
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: '检出代码库'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: '设置 Node.js 环境'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: '依赖审查'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: always
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, Unlicense, WTFPL, CC0-1.0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: '安装依赖'
        run: npm ci --ignore-scripts

      - name: '安全审计'
        id: audit
        run: |
          echo "## 🔒 安全审计报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          AUDIT_OUTPUT=$(npm audit --audit-level=moderate 2>&1 || true)

          if echo "$AUDIT_OUTPUT" | grep -q "found 0 vulnerabilities"; then
            echo "✅ 未发现已知漏洞" >> $GITHUB_STEP_SUMMARY
            echo "audit_status=clean" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 发现漏洞：" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$AUDIT_OUTPUT" | head -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "audit_status=warning" >> $GITHUB_OUTPUT
          fi

      - name: '许可证检查'
        id: license
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📜 许可证合规检查" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📊 许可证摘要" >> $GITHUB_STEP_SUMMARY
          npx --yes license-checker-rseidelsohn --summary >> $GITHUB_STEP_SUMMARY

          FORBIDDEN_LICENSES="GPL-2.0-only,GPL-2.0-or-later,GPL-3.0-only,GPL-3.0-or-later,AGPL-3.0-only,AGPL-3.0-or-later,LGPL-2.0-only,LGPL-2.0-or-later,LGPL-2.1-only,LGPL-2.1-or-later,LGPL-3.0-only,LGPL-3.0-or-later"
          
          VIOLATIONS=$(npx --yes license-checker-rseidelsohn --failOn "$FORBIDDEN_LICENSES" 2>&1 || true)
          
          if echo "$VIOLATIONS" | grep -q "package(s) using a forbidden license"; then
            echo "❌ **检测到许可证违规！**" >> $GITHUB_STEP_SUMMARY
            echo "以下包使用了受限许可证：" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$VIOLATIONS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "license_status=violation" >> $GITHUB_OUTPUT
          else
            echo "✅ 所有依赖均符合许可证政策。" >> $GITHUB_STEP_SUMMARY
            echo "license_status=ok" >> $GITHUB_OUTPUT
          fi

      - name: '依赖体积检查'
        id: size
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 依赖体积分析" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          NODE_MODULES_SIZE=$(du -sh node_modules 2>/dev/null | cut -f1 || echo "unknown")
          DEPENDENCY_COUNT=$(npm ls --depth=0 2>/dev/null | grep -c "^[├└]" || echo "0")

          echo "- **node_modules 体积**: $NODE_MODULES_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **直接依赖数量**: $DEPENDENCY_COUNT" >> $GITHUB_STEP_SUMMARY

          echo "size=$NODE_MODULES_SIZE" >> $GITHUB_OUTPUT
          echo "count=$DEPENDENCY_COUNT" >> $GITHUB_OUTPUT

      - name: '检查可疑脚本'
        id: scripts
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔍 脚本安全检查" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          LIFECYCLE_SCRIPTS="preinstall|postinstall|preuninstall|postuninstall|preprepare|postprepare|prepack|postpack"
          
          SUSPICIOUS_PKGS=""
          
          for pkg_dir in node_modules/*/; do
            if [ -f "${pkg_dir}package.json" ]; then
              pkg_name=$(basename "$pkg_dir")
              scripts=$(jq -r '.scripts // empty | to_entries[] | select(.key | test("'^$LIFECYCLE_SCRIPTS'$")) | .key' "${pkg_dir}package.json" 2>/dev/null || true)
              if [ -n "$scripts" ]; then
                script_list=$(echo "$scripts" | tr '\n' ',' | sed 's/,$//')
                SUSPICIOUS_PKGS="${SUSPICIOUS_PKGS}${pkg_name}: ${script_list}\n"
              fi
            fi
          done
          
          if [ -n "$SUSPICIOUS_PKGS" ]; then
            echo "⚠️ 发现包含生命周期脚本的依赖：" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo -e "$SUSPICIOUS_PKGS" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "scripts_status=warning" >> $GITHUB_OUTPUT
          else
            echo "✅ 未发现包含生命周期脚本的依赖" >> $GITHUB_STEP_SUMMARY
            echo "scripts_status=ok" >> $GITHUB_OUTPUT
          fi

      - name: '创建 PR 评论'
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const auditStatus = '${{ steps.audit.outputs.audit_status }}';
            const licenseStatus = '${{ steps.license.outputs.license_status }}';
            const depSize = '${{ steps.size.outputs.size }}';
            const depCount = '${{ steps.size.outputs.count }}';
            const scriptsStatus = '${{ steps.scripts.outputs.scripts_status }}';

            const statusEmoji = (status) => {
              if (status === 'clean' || status === 'ok') return '✅';
              if (status === 'warning' || status === 'violation') return '⚠️';
              return '❓';
            };

            let body = '## 🔍 依赖审查摘要\n\n';
            body += '| 检查项 | 状态 | 详情 |\n';
            body += '|-------|--------|---------|\n';
            body += `| 安全审计 | ${statusEmoji(auditStatus)} | ${auditStatus === 'clean' ? '无漏洞' : '需要审查'} |\n`;
            body += `| 许可证检查 | ${statusEmoji(licenseStatus)} | ${licenseStatus === 'ok' ? '合规' : '检测到违规'} |\n`;
            body += `| 脚本检查 | ${statusEmoji(scriptsStatus)} | ${scriptsStatus === 'ok' ? '无风险' : '需要审查'} |\n`;
            body += `| 依赖信息 | 📦 | ${depCount} 个直接依赖，总体积 ${depSize} |\n`;

            if (auditStatus === 'warning' || licenseStatus === 'violation' || scriptsStatus === 'warning') {
              body += '\n⚠️ **需要处理**：请查看 [工作流摘要](' + process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID + ') 中的审计结果。\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
